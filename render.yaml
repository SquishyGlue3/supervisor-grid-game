databases:
  - name: gridworld-db
    plan: free
    databaseName: gridworld
    user: gridworld_user

services:
  - type: web
    name: supervisor-ai-gridworld
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: gridworld-db
          property: connectionString
      - key: OPENROUTER_API_KEY
        sync: false  # You'll set this manually in Render dashboard
      - key: PROLIFIC_COMPLETION_URL
        sync: false  # You'll set this manually in Render dashboard
      - key: ADMIN_SECRET
        sync: false  # Set manually in Render dashboard; required for /api/sessions/count
      - key: AWS_ACCESS_KEY_ID
        sync: false  # Set manually in Render dashboard
      - key: AWS_SECRET_ACCESS_KEY
        sync: false  # Set manually in Render dashboard
      - key: S3_BUCKET
        sync: false  # Set manually in Render dashboard
      - key: AWS_REGION
        sync: false  # Set manually in Render dashboard
